name: deploy-pages

on:
  push:
    branches:
      - master
    paths:
      - 'docs/**'
  workflow_run:
    workflows: ["deploy-release"]
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Changes Page
        run: |
          # Prepare changes.md using placeholder replacement
          NEWS_CONTENT=$(cat NEWS.md)
          # Escape for sed: backslashes, forward slashes, newlines, and ampersands
          NEWS_CONTENT_ESCAPED=$(echo "$NEWS_CONTENT" | sed -e 's/\\/\\\\/g' -e 's/\//\\\//g' -e 's/&/\\\&/g' -e ':a;N;$!ba;s/\n/\\n/g')
          # POSIX sed compliant way to replace content of a file using a placeholder
          # Create a temporary file for sed script
          echo "s/<!-- NEWS_CONTENT_GOES_HERE -->/$NEWS_CONTENT_ESCAPED/g" > sed_script_changes.txt
          sed -i.bak -f sed_script_changes.txt docs/changes.md && rm sed_script_changes.txt docs/changes.md.bak

          # Prepare authors list for about.md using placeholder replacement
          AUTHORS_LIST_ITEMS=""
          # Read AUTHORS.txt and build the list items. Add newline before first item if list is not empty.
          FIRST_ITEM=true
          while IFS= read -r line || [ -n "$line" ]; do
            if [ -n "$line" ]; then
              if $FIRST_ITEM; then
                AUTHORS_LIST_ITEMS="- $line"
                FIRST_ITEM=false
              else
                AUTHORS_LIST_ITEMS="${AUTHORS_LIST_ITEMS}\n- $line"
              fi
            fi
          done < AUTHORS.txt

          # Escape for sed: backslashes, forward slashes, newlines, and ampersands
          AUTHORS_LIST_ESCAPED=$(echo "$AUTHORS_LIST_ITEMS" | sed -e 's/\\/\\\\/g' -e 's/\//\\\//g' -e 's/&/\\\&/g' -e ':a;N;$!ba;s/\n/\\n/g')

          # Create a temporary file for sed script to replace placeholder with list items
          # If AUTHORS_LIST_ESCAPED is empty, it will replace the placeholder with an empty string.
          echo "s/<!-- AUTHORS_LIST_GOES_HERE -->/$AUTHORS_LIST_ESCAPED/g" > sed_script_authors.txt
          sed -i.bak -f sed_script_authors.txt docs/about.md && rm sed_script_authors.txt docs/about.md.bak

      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Build
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./docs
          destination: ./_site
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
