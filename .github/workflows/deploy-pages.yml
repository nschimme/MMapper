name: deploy-pages

on:
  push:
    branches:
      - master
    paths:
      - 'docs/**'
  workflow_run:
    workflows: ["deploy-release"]
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Changes Page
        run: |
          # Prepare changes.md using placeholder replacement
          NEWS_CONTENT=$(cat NEWS.md)
          # Escape for sed: backslashes, forward slashes, newlines, and ampersands
          NEWS_CONTENT_ESCAPED=$(echo "$NEWS_CONTENT" | sed -e 's/\\/\\\\/g' -e 's/\//\\\//g' -e 's/&/\\\&/g' -e ':a;N;$!ba;s/\n/\\n/g')
          # POSIX sed compliant way to replace content of a file using a placeholder
          # Create a temporary file for sed script
          echo "s/<!-- NEWS_CONTENT_GOES_HERE -->/$NEWS_CONTENT_ESCAPED/g" > sed_script_changes.txt
          sed -i.bak -f sed_script_changes.txt docs/changes.md && rm sed_script_changes.txt docs/changes.md.bak

          # Prepare authors list for about.md using placeholder replacement
          AUTHORS_SECTION_CONTENT="## Contributors\n"
          AUTHORS_LIST_MARKDOWN=""
          while IFS= read -r line || [ -n "$line" ]; do
            if [ -n "$line" ]; then
              AUTHORS_LIST_MARKDOWN="${AUTHORS_LIST_MARKDOWN}\n- $line"
            fi
          done < AUTHORS.txt

          if [ -n "$AUTHORS_LIST_MARKDOWN" ]; then
            AUTHORS_SECTION_CONTENT="${AUTHORS_SECTION_CONTENT}${AUTHORS_LIST_MARKDOWN}"
            # Escape for sed
            AUTHORS_SECTION_ESCAPED=$(echo "$AUTHORS_SECTION_CONTENT" | sed -e 's/\\/\\\\/g' -e 's/\//\\\//g' -e 's/&/\\\&/g' -e ':a;N;$!ba;s/\n/\\n/g')
            # Create a temporary file for sed script
            echo "s/<!-- AUTHORS_LIST_GOES_HERE -->/$AUTHORS_SECTION_ESCAPED/g" > sed_script_authors.txt
            sed -i.bak -f sed_script_authors.txt docs/about.md && rm sed_script_authors.txt docs/about.md.bak
          else
            # If there are no authors, replace placeholder with empty string or a message
            echo "s/<!-- AUTHORS_LIST_GOES_HERE -->//g" > sed_script_authors.txt
            sed -i.bak -f sed_script_authors.txt docs/about.md && rm sed_script_authors.txt docs/about.md.bak
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Build
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./docs
          destination: ./_site
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
