
<!DOCTYPE html>
<html>
<head>
    <title>Play MUME!</title>
    <meta charset="utf-8">
    <link rel="stylesheet" type="text/css" href="qrc:/decafmud/css/main.css" />
    <link rel="stylesheet" type="text/css" href="qrc:/decafmud/css/mud-colors.css" />
    <link rel="stylesheet" type="text/css" href="qrc:/decafmud/css/decafmud.css" />
    <link rel="stylesheet" type="text/css" href="qrc:/decafmud/css/decafmud-dark.css" />
    <script src="qrc:/decafmud/js/decafmud.js" type="text/javascript"></script>
    <script src="qrc:/decafmud/js/decafmud.display.standard.js" type="text/javascript"></script>
    <script src="qrc:/decafmud/js/decafmud.encoding.iso885915.js" type="text/javascript"></script>
    <script src="qrc:/decafmud/js/decafmud.socket.websocket.js" type="text/javascript"></script>
    <script src="qrc:/decafmud/js/decafmud.storage.standard.js" type="text/javascript"></script>
    <script src="qrc:/decafmud/js/decafmud.interface.panels.js" type="text/javascript"></script>
    <script src="qrc:/decafmud/js/decafmud.interface.panels.menu.js" type="text/javascript"></script>
    <script src="qrc:/decafmud/js/decafmud.interface.panels.settings.js" type="text/javascript"></script>
    <script src="qrc:/decafmud/js/dragelement.js" type="text/javascript"></script>
    <script src="qrc:/decafmud/mume.macros.js" type="text/javascript"></script>
    <script src="qrc:/decafmud/mume.menu.js" type="text/javascript"></script>
    <script type="text/javascript">
        window.onload = function() {
            new DecafMUD({
                host: "localhost",
                port: 4242,
                autoreconnect	: false,

                // Socket Settings
                set_socket              : {
                    // WebSocket Specific
                    wsport          : 4243,
                    wspath          : '/mume/play/websocket',
                    ssl             : false
                },

                interface           : 'panels',
                set_interface   : {
                    container    : "#mume-client",
                    connect_hint : false,
                    repeat_input : false,
                    start_full   : true
                },

                language : 'en', // circumvent the language buggy autoloader

                socket: "websocket"

            });
        };
    </script>
</head>
<body>
    <div id="mume-client">
        <noscript>You would be able to play MUME from within your browser if you had Javascript enabled.</noscript>
    </div>
    <img id="image">
    <script>
    var wsUri = "ws://localhost:4343/mume/webcanvas";
    var websocket = new WebSocket(wsUri);
    websocket.onmessage = function(event) {
    var blob = event.data;
    var image = document.getElementById('image');
    var reader = new FileReader();
    reader.onload = function(e) {
    image.src = e.target.result;
    };
    reader.readAsDataURL(blob);
    };
    </script>
</body>
</html>
