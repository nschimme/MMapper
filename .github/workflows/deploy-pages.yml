name: deploy-pages

on:
  push:
    branches:
      - master
    paths:
      - 'docs/**'
  workflow_run:
    workflows: ["deploy-release"]
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Changes Page
        run: |
          # Prepare changes.md from NEWS.md
          cp NEWS.md docs/changes.md
          sed -i '1s/^/---\ntitle: Changes\nlayout: default\n---\n\n/' docs/changes.md

          # Prepare authors list for about.md
          AUTHORS_CONTENT="## Contributors\n"
          while IFS= read -r line || [ -n "$line" ]; do
            if [ -n "$line" ]; then
              AUTHORS_CONTENT="${AUTHORS_CONTENT}\n- $line"
            fi
          done < AUTHORS.txt

          # Escape for sed: first escape backslashes, then forward slashes, then newlines
          AUTHORS_CONTENT_ESCAPED=$(echo "$AUTHORS_CONTENT" | sed -e 's/\\/\\\\/g' -e 's/\//\\\//g' -e ':a;N;$!ba;s/\n/\\n/g')

          # The line to be replaced in about.md (escape special characters for sed pattern)
          LINE_TO_REPLACE_PATTERN="The MMapper project is maintained by the following \\[contributors\\]({{site.authors}})\\."

          sed -i "/${LINE_TO_REPLACE_PATTERN}/c\\${AUTHORS_CONTENT_ESCAPED}" docs/about.md

      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Build
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./docs
          destination: ./_site
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
